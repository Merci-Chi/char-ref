      function clearRosterDropGaps() {
        document
          .querySelectorAll(".roster-slot.drop-before, .roster-slot.drop-after")
          .forEach((slot) => {
            slot.classList.remove("drop-before", "drop-after");
          });
      }

      function showRosterDropGap(slot, clientX) {
        clearRosterDropGaps();
        if (!slot || slot.dataset.character === draggedCharacterName)
          return null;
        const source = characters.find(
          (character) => character.name === draggedCharacterName,
        );
        if (
          !source ||
          (source.category || "") !== (slot.dataset.category || "")
        )
          return null;
        const before =
          clientX <
          slot.getBoundingClientRect().left +
            slot.getBoundingClientRect().width / 2;
        slot.classList.add(before ? "drop-before" : "drop-after");
        return { targetName: slot.dataset.character, before };
      }

      function reorderCharacter(sourceName, targetName, before) {
        if (!sourceName || !targetName || sourceName === targetName) return;
        const source = characters.find(
          (character) => character.name === sourceName,
        );
        const target = characters.find(
          (character) => character.name === targetName,
        );
        if (
          !source ||
          !target ||
          (source.category || "") !== (target.category || "")
        )
          return;
        const sourceIndex = characters.indexOf(source);
        characters.splice(sourceIndex, 1);
        const targetIndex = characters.indexOf(target);
        characters.splice(targetIndex + (before ? 0 : 1), 0, source);
        saveCharacters();
        suppressRosterClick = true;
        render();
        setTimeout(() => {
          suppressRosterClick = false;
        }, 0);
      }

      function setupRosterReordering() {
        document.querySelectorAll(".roster-card").forEach((card) => {
          card.addEventListener("dragstart", (event) => {
            draggedCharacterName = card.dataset.character;
            suppressRosterClick = true;
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", draggedCharacterName);
            requestAnimationFrame(() => card.classList.add("dragging"));
          });
          card.addEventListener("dragend", () => {
            card.classList.remove("dragging");
            draggedCharacterName = "";
            clearRosterDropGaps();
            setTimeout(() => {
              suppressRosterClick = false;
            }, 0);
          });
        });

        document.querySelectorAll(".roster-slot").forEach((slot) => {
          slot.addEventListener("dragover", (event) => {
            const gap = showRosterDropGap(slot, event.clientX);
            if (!gap) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = "move";
          });
          slot.addEventListener("drop", (event) => {
            event.preventDefault();
            const gap = showRosterDropGap(slot, event.clientX);
            if (gap)
              reorderCharacter(
                draggedCharacterName,
                gap.targetName,
                gap.before,
              );
          });
        });

        setupTouchRosterReordering();
      }

      function setupTouchRosterReordering() {
        document.querySelectorAll(".roster-card").forEach((card) => {
          let pressTimer = null;
          let active = false;
          let startX = 0;
          let startY = 0;
          let pendingGap = null;

          card.addEventListener("pointerdown", (event) => {
            if (event.pointerType !== "touch") return;
            startX = event.clientX;
            startY = event.clientY;
            pressTimer = setTimeout(() => {
              active = true;
              suppressRosterClick = true;
              draggedCharacterName = card.dataset.character;
              card.classList.add("dragging");
              card.setPointerCapture(event.pointerId);
            }, 300);
          });

          card.addEventListener("pointermove", (event) => {
            if (event.pointerType !== "touch") return;
            if (!active) {
              if (
                Math.hypot(event.clientX - startX, event.clientY - startY) > 10
              ) {
                clearTimeout(pressTimer);
              }
              return;
            }
            event.preventDefault();
            const target = document
              .elementFromPoint(event.clientX, event.clientY)
              ?.closest(".roster-slot");
            pendingGap = showRosterDropGap(target, event.clientX);
            const edge = 70;
            if (event.clientY < edge) window.scrollBy(0, -22);
            if (event.clientY > window.innerHeight - edge)
              window.scrollBy(0, 22);
          });

          const finish = () => {
            clearTimeout(pressTimer);
            if (active && pendingGap) {
              reorderCharacter(
                draggedCharacterName,
                pendingGap.targetName,
                pendingGap.before,
              );
            }
            active = false;
            pendingGap = null;
            draggedCharacterName = "";
            card.classList.remove("dragging");
            clearRosterDropGaps();
            setTimeout(() => {
              suppressRosterClick = false;
            }, 0);
          };

          card.addEventListener("pointerup", finish);
          card.addEventListener("pointercancel", finish);
        });
      }

      function findCharacterByName(name) {
        const normalized = String(name || "")
          .trim()
          .toLowerCase();
        return characters.find(
          (character) => character.name.trim().toLowerCase() === normalized,
        );
      }

      function upsertCharacter(character) {
        const existing = findCharacterByName(character.name);
        if (!existing) {
          characters.push(character);
          return;
        }
        const index = characters.indexOf(existing);
        characters[index] = { ...character, name: existing.name };
      }

      function openRelation(from, to) {
        const c = characters.find((x) => x.name === from);
        const relation = c?.relations?.find((r) => r.with === to);
        const other = characters.find((x) => x.name === to);
        openModal(
          `${from} -> ${to}`,
          `
            <div class="relationship-card" style="cursor:default">
              <div class="avatar">${initials(to)}</div>
              <div>
                <b>${safe(relation?.type)}</b>
                <small>${safe(relation?.note)}</small>
              </div>
            </div>
            <hr>
            <p><b>History:</b> ${safe(relation?.history || "Add a history field to expand this relationship.")}</p>
            ${other ? `<p><b>${htmlEscape(to)}:</b> ${htmlEscape(safe(other.description))}</p><button class="btn primary" data-character="${htmlEscape(to)}" onclick="goToCharacter(this.dataset.character); closeModal();">Jump to ${htmlEscape(to)}</button>` : ""}
          `,
        );
      }

      function closeModal() {
        activeEditorMode = null;
        modal.classList.remove("open");
      }

      function goToCharacter(name) {
        const absolute = characters.findIndex((c) => c.name === name);
        goToCharacterByIndex(absolute);
      }

      function goToCharacterByIndex(absolute) {
        if (
          !Number.isInteger(absolute) ||
          absolute < 0 ||
          absolute >= characters.length
        )
          return;
        const filtered = filteredIndexes.indexOf(absolute);
        if (filtered >= 0) currentIndex = filtered;
        else {
          activeFilters = new Set(["All"]);
          filteredIndexes = characters.map((_, i) => i);
          currentIndex = absolute;
        }
        viewMode = "detail";
        currentTab = "Overview";
        currentPhoto = 0;
        renderFilters();
        render();
      }

      function nextCharacter(step = 1) {
        if (!filteredIndexes.length) return;
        if (viewMode !== "detail") {
          currentIndex = step > 0 ? 0 : filteredIndexes.length - 1;
          viewMode = "detail";
          currentTab = "Overview";
          currentPhoto = 0;
          render();
          return;
        }
        currentIndex =
          (currentIndex + step + filteredIndexes.length) %
          filteredIndexes.length;
        currentPhoto = 0;
        render();
      }

      function setExportChecks(checked) {

          .querySelectorAll(".export-character-check")

      function selectedExportCharacters() {
        const indexes = [
          ...document.querySelectorAll(".export-character-check:checked"),
        ].map((input) => Number(input.value));
        return indexes.map((index) => characters[index]).filter(Boolean);
      }

      function exportSelectedCharacters() {
        const selected = selectedExportCharacters();
        if (!selected.length) return;
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          characters: selected,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json",
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download =
          selected.length === 1
            ? `${selected[0].name.replace(/\s+/g, "-").toLowerCase()}.json`
            : "character-codex-export.json";
        document.body.appendChild(link);
        link.click();
        URL.revokeObjectURL(link.href);
        link.remove();
      }

      function prepareImportCharacters() {
        const file = $("importFile")?.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            const incoming = Array.isArray(parsed) ? parsed : parsed.characters;
            if (!Array.isArray(incoming) || !incoming.length) return;
            pendingImportCharacters = incoming.map(normalizeCharacter);
            renderImportPreview();
          } catch {
            openModal(
              "Import Failed",
              "<p>That file could not be read as character codex JSON.</p>",
            );
          }
        };
        reader.readAsText(file);
      }

      function renderImportPreview() {
        const preview = $("importPreview");
        if (!preview) return;
        preview.innerHTML = `
          <div class="settings-list">
            ${pendingImportCharacters
              .map((character, index) => {
                const existing = findCharacterByName(character.name);
                return `
                  <div class="settings-row">
                    <label>
                      <input type="checkbox" class="import-character-check" value="${index}" />
                      ${htmlEscape(character.name)}
                    </label>
                    <small>${existing ? "Update" : "Add"}</small>
                  </div>`;
              })
              .join("")}

            <div class="form-actions-group">
              <button class="btn" onclick="setImportChecks(true)">Select All</button>
              <button class="btn" onclick="setImportChecks(false)">Select None</button>
            </div>
            <button class="btn primary" onclick="importSelectedCharacters()">Import Selected</button>
          </div>
        `;
      }

        document

      function importSelectedCharacters() {
        const selected = [
          ...document.querySelectorAll(".import-character-check:checked"),
        ]
          .map((input) => pendingImportCharacters[Number(input.value)])
          .filter(Boolean);
        if (!selected.length) return;
        const updates = selected.filter((character) =>
          findCharacterByName(character.name),
        ).length;
        const additions = selected.length - updates;
        const summary = [
          additions
            ? `${additions} character${additions === 1 ? "" : "s"} will be added.`
            : "",
          updates
            ? `${updates} same-name character${updates === 1 ? "" : "s"} will be updated.`
            : "",
        ]
          .filter(Boolean)
          .join(" ");
        showDecision("Verify Import", summary, "Import", () => {
          selected.forEach((character) => upsertCharacter(character));
          saveCharacters();
          filteredIndexes = characters.map((_, i) => i);
          currentIndex = 0;
          activeFilters = new Set(["All"]);
          viewMode = "roster";
          closeModal();
          render();
        });
      }

                ${formInput("Gender", "charGender", source.gender)}
                ${formInput("Age", "charAge", source.age)}
                ${formInput("Height", "charHeight", source.height)}
                ${formInput("Weight", "charWeight", source.weight)}
                ${formInput("Short Description", "charShortDescription", source.shortDescription, true, false, "text", "Quiet wolf-hybrid blade-for-hire.")}
              `,
              true,
            )}
            ${editorPanel(
              "Appearance",
              `
                ${formInput("Body Type", "charBodyType", source.bodyType)}
                ${formInput("Eyes", "charEyeColor", source.eyeColor)}
                ${formInput("Hair Color", "charHairColor", source.hairColor)}
                ${formInput("Hair Style", "charHairStyle", source.hairStyle, true)}
                ${formInput("Skin / Fur / Scale", "charSkinColor", source.skinColor, true)}
                ${formInput("Markings", "charMarkings", source.markings, true)}
                ${formInput("Features", "charFeatures", source.features, true)}
                ${formInput("Shirt / Top", "charShirt", source.outfit?.shirt)}
                ${formInput("Pants / Bottoms", "charPants", source.outfit?.pants)}
                ${formInput("Shoes", "charShoes", source.outfit?.shoes)}
                ${formInput("Hat", "charHat", source.outfit?.hat)}
                ${formInput("Outerwear", "charOuterwear", source.outfit?.outerwear, true)}
                ${formInput("Accessories", "charAccessories", source.accessories, true)}
              `,
            )}
            ${editorPanel(
              "Combat",
              `
                ${statSelect("Power", "statPower", source.stats?.power)}
                ${statSelect("Speed", "statSpeed", source.stats?.speed)}
                ${statSelect("Defense", "statDefense", source.stats?.defense)}
                ${statSelect("Magic", "statMagic", source.stats?.magic)}
                ${statSelect("Resolve", "statResolve", source.stats?.resolve)}
                ${formInput("Fighting Style", "charFightingStyle", source.fightingStyle, true, true, "text", "Fast, defensive, reckless, tactical...")}
                ${formInput("Weapons", "charWeapons", source.weapons, true)}
                ${formInput("Strengths", "charStrengths", source.strengths, true)}
                ${formInput("Weaknesses", "charWeaknesses", source.weaknesses, true)}
              `,
            )}
            ${editorPanel(
              "Personality",
              `
                ${formInput("Personality Tags", "charPersonality", source.personality, true, false, "text", "Red, Blue, Orange, Yellow")}
                ${formInput("Speech Style", "charSpeechStyle", source.speechStyle, true, true, "text", "Short, formal, sarcastic, soft-spoken...")}
                ${formInput("Likes", "charLikes", source.likes)}
                ${formInput("Dislikes", "charDislikes", source.dislikes)}
                ${formInput("Fears", "charFears", source.fears)}
                ${formInput("Hobbies", "charHobbies", source.hobbies)}
              `,
            )}
            ${editorPanel(
              "Lore",
              `
                ${formInput("Description", "charDescription", source.description, true, true, "text", "Longer character description.")}
              `,
            )}
            ${editorPanel(
              "Relations",
              `
                <div class="form-field wide">
                  <label>Relations</label>
                  ${relationEditor(source)}
                </div>
              `,
            )}
            <div class="form-actions">
              <div class="form-actions-group">
                ${editing ? `<button class="btn danger" data-character="${htmlEscape(source.name)}" onclick="deleteCharacterFromEditor(this.dataset.character)">Delete</button>` : ""}
              </div>
              <div class="form-actions-group">
                <button class="btn" onclick="cancelCharacterEditor()">Cancel</button>
                <button class="btn primary" data-old-name="${htmlEscape(source.name)}" onclick="saveCharacterFromForm('${mode}', this.dataset.oldName)">Done</button>
              </div>
            </div>
          `,
        );
      }

      function value(id) {
        return $(id)?.value.trim() || "";
      }

      function statValue(id) {
        const raw = value(id);
        if (raw === "-") return "-";
        return Math.max(0, Math.min(10, Number(raw) || 0));
      }

      function parseRelations(text) {
        return text
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const [withName, type, note, history] = line
              .split("|")
              .map((part) => part.trim());
            return {
              with: withName || "",
              type: type || "Related",
              note: note || "",
              history: history || "",
            };
          })
          .filter((relation) => relation.with);
      }

      function collectRelationsFromEditor() {
        return [...document.querySelectorAll(".relation-edit-card")]
          .map((card) => {
            const enabled = card.querySelector(".relation-toggle")?.checked;
            if (!enabled) return null;
            const kind =
              card.querySelector('input[type="radio"]:checked')?.value ||
              "Other";
            const type =
              card.querySelector('input[id^="relationType-"]')?.value.trim() ||
              "Related";
            const note =
              card
                .querySelector(
                  'textarea[id^="relationNote-"], input[id^="relationNote-"]',
                )
                ?.value.trim() || "";
            return {
              with: card.dataset.relationTarget,
              kind,
              type,
              note,
              history: "",
            };
          })
          .filter(Boolean);
      }

      function validateCharacterForm() {
        const input = $("charName");
        const field = input?.closest(".form-field");
        field?.classList.remove("error");
        if (value("charName")) return true;
        field?.classList.add("error");
        input?.scrollIntoView({ behavior: "smooth", block: "center" });
        input?.focus();
        return false;
      }

      function toggleRelationEditor(input) {
        input
          .closest(".relation-edit-card")
          ?.classList.toggle("active", input.checked);
      }

      function setEditorTab(tab) {
        document.querySelectorAll(".editor-tabs .tab").forEach((button) => {
          button.classList.toggle("active", button.textContent.trim() === tab);
        });
        document.querySelectorAll(".editor-tab-panel").forEach((panel) => {
          panel.classList.toggle("active", panel.dataset.editorTab === tab);
        });
      }

      function selectTheme(name) {
        const selected = themeByName(name);
        $("charThemeName").value = selected.name;
        document.querySelectorAll(".theme-swatch").forEach((button) => {
          button.classList.toggle(
            "active",
            button.getAttribute("aria-label") === selected.name,
          );
        });
      }

      function addPhotoFile(input) {
        const file = input.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const photos = $("charPhotos");
          photos.value = reader.result;
          const preview = $("photoPreview");
          if (preview) preview.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function cancelCharacterEditor() {
        activeEditorMode = null;
        closeModal();
      }

      function switchEditorCharacter(step) {
        if (activeEditorMode !== "edit") return;
        nextCharacter(step);
        openCharacterForm("edit");
      }

      function saveCharacterFromForm(mode, oldName) {
        if (!validateCharacterForm()) return;
        const name = value("charName");
        const character = {
          name,
          title: value("charTitle"),
          nicknames: value("charNicknames"),
          age: value("charAge"),
          category: value("charCategory"),
          gender: value("charGender"),
          species: value("charSpecies") || "Unknown",
          height: value("charHeight"),
          bodyType: value("charBodyType"),
          weight: value("charWeight"),
          occupation: value("charOccupation"),
          eyeColor: value("charEyeColor"),
          hairColor: value("charHairColor"),
          hairStyle: value("charHairStyle"),
          skinColor: value("charSkinColor"),
          markings: value("charMarkings"),
          features: value("charFeatures"),
          themeName: value("charThemeName") || "Light Blue",
          theme: themeByName(value("charThemeName") || "Light Blue"),
          outfit: {
            shirt: value("charShirt"),
            pants: value("charPants"),
            shoes: value("charShoes"),
            hat: value("charHat"),
            outerwear: value("charOuterwear"),
          },
          accessories: value("charAccessories"),
          weapons: value("charWeapons"),
          shortDescription: value("charShortDescription"),
          description: value("charDescription"),
          personality: value("charPersonality"),
          fightingStyle: value("charFightingStyle"),
          speechStyle: value("charSpeechStyle"),
          strengths: value("charStrengths"),
          weaknesses: value("charWeaknesses"),
          likes: value("charLikes"),
          dislikes: value("charDislikes"),
          fears: value("charFears"),
          hobbies: value("charHobbies"),
          stats: {
            power: statValue("statPower"),
            speed: statValue("statSpeed"),
            defense: statValue("statDefense"),
            magic: statValue("statMagic"),
            resolve: statValue("statResolve"),
          },
          photos: value("charPhotos") ? [value("charPhotos")] : [],
          relations: collectRelationsFromEditor(),
        };

        const commit = () => {
          if (mode === "edit") {
            const index = characters.findIndex((c) => c.name === oldName);
            if (index >= 0) characters[index] = character;
            if (oldName !== name) {
              characters.forEach((c) => {
                (c.relations || []).forEach((relation) => {
                  if (relation.with === oldName) relation.with = name;
                });
              });
              if (relationPositions[oldName]) {
                relationPositions[name] = relationPositions[oldName];
                delete relationPositions[oldName];
                saveRelationPositions();
              }
            }
          } else {
            upsertCharacter(character);
          }

          saveCharacters();
          activeEditorMode = null;
          closeModal();
          activeFilters = new Set(["All"]);
          viewMode = "detail";
          filteredIndexes = characters.map((_, i) => i);
          currentIndex = Math.max(
            0,
            characters.findIndex(
              (c) => c.name.toLowerCase() === name.toLowerCase(),
            ),
          );
          currentPhoto = 0;
          render();
        };

        if (mode === "add") {
          const existing = findCharacterByName(name);
          if (existing) {
            showDecision(
              "There's already a character by that name",
              `Update ${existing.name} with the information in this form?`,
              "Update",
              commit,
            );
          } else {
            showDecision(
              "Add Character",
              `Add ${name} to the roster?`,
              "Add",
              commit,
            );
          }
          return;
        }

        commit();
      }

      function deleteCharacterFromEditor(name) {
        if (characters.length <= 1) {
          openModal(
            "Cannot Delete",
            "<p>Keep at least one character in the codex.</p>",
          );
          return;
        }
        requestDeleteCharacter(name);
      }

      function deleteCurrentCharacter() {
        if (characters.length <= 1) {
          openModal(
            "Cannot Delete",
            "<p>Keep at least one character in the codex.</p>",
          );
          return;
        }
        const character = currentCharacter();
        requestDeleteCharacter(character.name);
      }

      function requestDeleteCharacter(name) {
        const character = characters.find((item) => item.name === name);
        if (!character) return;
        showDecision(
          "Delete Character",
          `Delete ${character.name}? This also removes every relation that points to them.`,
          "Delete",
          () => confirmDeleteCharacter(character.name),
        );
      }

      function confirmDeleteCharacter(name) {
        characters = characters.filter((c) => c.name !== name);
        characters.forEach((c) => {
          c.relations = (c.relations || []).filter(
            (relation) => relation.with !== name,
          );
        });
        delete relationPositions[name];
        saveCharacters();
        saveRelationPositions();
        activeEditorMode = null;
        closeModal();
        currentIndex = Math.min(currentIndex, characters.length - 1);
        currentPhoto = 0;
        activeFilters = new Set(["All"]);
        viewMode = "roster";
        render();
      }

      function editHelpModal() {
        openModal(
          "Edit Guide",
          `
            <details open><summary>Add characters</summary><div class="details-body">Find <b>const characters = [</b> in the HTML. Duplicate a character block, then change the values.</div></details><br>
            <details open><summary>Add photos</summary><div class="details-body">Put image files next to this HTML or inside an <b>images</b> folder. Then edit the character's <b>photos</b> list, like <code>["images/name-main.png"]</code>.</div></details><br>
            <details open><summary>Change colors</summary><div class="details-body">Edit each character's <b>theme</b> values for accent, secondary accent, and dark backdrop color.</div></details><br>
            <details><summary>Add relations</summary><div class="details-body">Inside a character, edit <b>relations</b>. Use <b>with</b>, <b>type</b>, <b>note</b>, and optional <b>history</b>.</div></details>
          `,
        );
      }

      function setupImageGestures() {
        const wrap = $("photoWrap");

        wrap.addEventListener("pointerdown", (e) => {
          if (e.target.closest?.(".photo-tabs, .image-controls")) return;
          wrap.setPointerCapture(e.pointerId);
          activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          if (activePointers.size === 2) {
            lastPinchDistance = distanceBetweenPointers();
            lastDragPoint = null;
          } else if (imageScale > 1.01) {
            lastDragPoint = { x: e.clientX, y: e.clientY };
          }
        });

        wrap.addEventListener("pointermove", (e) => {
          if (!activePointers.has(e.pointerId)) return;
          activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          if (activePointers.size >= 2) {
            e.preventDefault();
            const nextDistance = distanceBetweenPointers();
            if (lastPinchDistance) {
              const mid = midpointBetweenPointers();
              const rect = wrap.getBoundingClientRect();
              zoomImageBy(
                nextDistance / lastPinchDistance,
                mid.x - rect.left - rect.width / 2,
                mid.y - rect.top - rect.height / 2,
              );
            }
            lastPinchDistance = nextDistance;
            return;
          }

          if (imageScale > 1.01 && lastDragPoint) {
            e.preventDefault();
            imagePanX += e.clientX - lastDragPoint.x;
            imagePanY += e.clientY - lastDragPoint.y;
            lastDragPoint = { x: e.clientX, y: e.clientY };
            applyImageTransform();
          }
        });

        function endPointer(e) {
          activePointers.delete(e.pointerId);
          lastPinchDistance =
            activePointers.size >= 2 ? distanceBetweenPointers() : 0;
          lastDragPoint = null;
        }

        wrap.addEventListener("pointerup", endPointer);
        wrap.addEventListener("pointercancel", endPointer);
        wrap.addEventListener("lostpointercapture", endPointer);

        wrap.addEventListener(
          "wheel",
          (e) => {
            if (!e.ctrlKey && !e.metaKey) return;
            e.preventDefault();
            const rect = wrap.getBoundingClientRect();
            const centerX = e.clientX - rect.left - rect.width / 2;
            const centerY = e.clientY - rect.top - rect.height / 2;
            zoomImageBy(e.deltaY < 0 ? 1.12 : 0.88, centerX, centerY);
          },
          { passive: false },
        );
      }

      function disablePageZoom() {
        ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
          document.addEventListener(
            eventName,
            (event) => event.preventDefault(),
            { passive: false },
          );
        });
        document.addEventListener(
          "wheel",
          (event) => {
            if (event.ctrlKey || event.metaKey) event.preventDefault();
          },
          { passive: false, capture: true },
        );
        document.addEventListener(
          "touchmove",
          (event) => {
            if (
              event.touches.length > 1 &&
              !event.target.closest?.("#relationMap")
            ) {
              event.preventDefault();
            }
          },
          { passive: false, capture: true },
        );
        document.addEventListener(
          "keydown",
          (event) => {
            if (
              (event.ctrlKey || event.metaKey) &&
              ["+", "-", "=", "0"].includes(event.key)
            ) {
              event.preventDefault();
            }
          },
          { capture: true },
        );
      }

      disablePageZoom();
      setupImageGestures();
      renderFilters();

      $("prevBtn").onclick = () =>
        activeEditorMode === "edit"
          ? switchEditorCharacter(-1)
          : nextCharacter(-1);
      $("nextBtn").onclick = () =>
        activeEditorMode === "edit"
          ? switchEditorCharacter(1)
          : nextCharacter(1);
      $("randomBtn").onclick = () => {
        randomFilteredCharacter();
      };
      $("addCharacterBtn").onclick = () =>
        viewMode === "locations"
          ? openLocationForm()
          : openCharacterForm("add");
      $("editCharacterBtn").onclick = () =>
        viewMode === "locations"
          ? openLocationPicker()
          : openCharacterForm("edit");
      $("allCharactersBtn").onclick = openRosterView;
      $("relationsBtn").onclick = openRelationsView;
      $("settingsBtn").onclick = settingsModal;
      $("closeModal").onclick = closeModal;
      $("decisionCancel").onclick = closeDecision;
      $("decisionConfirm").onclick = () => {
        const action = decisionAction;
        closeDecision();
        action?.();
      };
      modal.onclick = (e) => {
        if (e.target === modal) closeModal();
      };
      decisionDialog.onclick = (e) => {
        if (e.target === decisionDialog) closeDecision();
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight")
          activeEditorMode === "edit"
            ? switchEditorCharacter(1)
            : nextCharacter(1);
        if (e.key === "ArrowLeft")
          activeEditorMode === "edit"
            ? switchEditorCharacter(-1)
            : nextCharacter(-1);
        if (e.key === "Escape") {
          if (decisionDialog.classList.contains("open")) closeDecision();
          else closeModal();
        }
      });

      let touchStartX = 0;
      document.addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.changedTouches[0].screenX;
        },
        { passive: true },
      );
      document.addEventListener(
        "touchend",
        (e) => {
          const diff = e.changedTouches[0].screenX - touchStartX;
          if (Math.abs(diff) > 70) nextCharacter(diff < 0 ? 1 : -1);
        },
        { passive: true },
      );

      let wheelCooldown = false;
      document.addEventListener(
        "wheel",
        (e) => {
          if (e.target.closest?.("#photoWrap")) return;
          if (
            Math.abs(e.deltaX) > Math.abs(e.deltaY) &&
            Math.abs(e.deltaX) > 40 &&
            !wheelCooldown
          ) {
            nextCharacter(e.deltaX > 0 ? 1 : -1);
            wheelCooldown = true;
            setTimeout(() => (wheelCooldown = false), 550);
          }
        },
        { passive: true },
      );

      window.setTab = setTab;
      window.setFilter = setFilter;
      window.goToCharacter = goToCharacter;
      window.goToCharacterByIndex = goToCharacterByIndex;
      window.openModal = openModal;
      window.openRelation = openRelation;
      window.settingsModal = settingsModal;
      window.setExportChecks = setExportChecks;
      window.exportSelectedCharacters = exportSelectedCharacters;
      window.importCharacters = importCharacters;
      window.prepareImportCharacters = prepareImportCharacters;
      window.setImportChecks = setImportChecks;
      window.importSelectedCharacters = importSelectedCharacters;
      window.openCharacterForm = openCharacterForm;
      window.saveCharacterFromForm = saveCharacterFromForm;
      window.confirmDeleteCharacter = confirmDeleteCharacter;
      window.deleteCharacterFromEditor = deleteCharacterFromEditor;
      window.switchEditorCharacter = switchEditorCharacter;
      window.cancelCharacterEditor = cancelCharacterEditor;
      window.toggleRelationEditor = toggleRelationEditor;
      window.setEditorTab = setEditorTab;
      window.selectTheme = selectTheme;
      window.addPhotoFile = addPhotoFile;
      window.zoomRelationMap = zoomRelationMap;
      window.resetRelationMapZoom = resetRelationMapZoom;
      window.openLocationForm = openLocationForm;
      window.openLocationPicker = openLocationPicker;
      window.saveLocationForm = saveLocationForm;
      window.requestDeleteLocation = requestDeleteLocation;
      window.closeModal = closeModal;

      render();
    </script>
  </body>
</html>
