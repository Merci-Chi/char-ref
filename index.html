<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Codex</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap");

      :root {
        --bg: #080a0d;
        --surface: rgba(13, 17, 23, 0.78);
        --surface-strong: rgba(19, 24, 32, 0.94);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f6f2ea;
        --muted: #b7b0a3;
        --soft: rgba(255, 255, 255, 0.075);
        --accent: #88d8ff;
        --accent-2: #dbefff;
        --accent-3: #2b6e8f;
        --danger: #ff6c54;
        --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.18)),
          var(--backdrop, linear-gradient(135deg, #101821, #25150f));
        background-size: cover;
        background-position: center;
        filter: blur(30px) saturate(1.15);
        transform: scale(1.08);
        opacity: 0.46;
        z-index: -2;
      }

      body::after {
        background:
          linear-gradient(180deg, rgba(8, 10, 13, 0.1), #080a0d 72%),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 0,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px,
            transparent 86px
          );
        z-index: -1;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        width: min(1500px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
      }

      .brand h1 {
        margin: 0;
        font-family: Outfit, Inter, sans-serif;
        font-size: clamp(1.7rem, 3vw, 3rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .brand p {
        margin: 7px 0 0;
        color: var(--muted);
        max-width: 720px;
        line-height: 1.45;
      }

      .actions,
      .filters,
      .tabs,
      .chips,
      .thumbs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .actions {
        justify-content: flex-end;
      }

      .manage-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .btn,
      .tab,
      .filter,
      .thumb {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.065);
        border-radius: var(--radius);
        cursor: pointer;
        transition:
          transform 0.16s ease,
          border-color 0.16s ease,
          background 0.16s ease,
          color 0.16s ease;
      }

      .btn:hover,
      .tab:hover,
      .filter:hover,
      .thumb:hover {
        transform: translateY(-1px);
        border-color: color-mix(in srgb, var(--accent) 58%, white 12%);
        background: rgba(255, 255, 255, 0.1);
      }

      .btn {
        min-height: 40px;
        padding: 9px 12px;
        font-weight: 800;
      }

      .btn.primary {
        color: #071016;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border-color: transparent;
        box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 34%, transparent);
      }

      .btn.danger {
        border-color: color-mix(in srgb, var(--danger) 42%, var(--line));
        color: #ffd7d1;
      }

      .btn.icon {
        width: 42px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 1.1rem;
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .searchbar {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border-radius: var(--radius);
        padding: 10px 13px;
        outline: none;
      }

      .searchbar:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent);
      }

      .filter {
        padding: 9px 11px;
        color: var(--muted);
        font-weight: 800;
      }

      .filter.active {
        color: #071016;
        background: var(--accent);
        border-color: transparent;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(290px, 360px) minmax(0, 1fr);
        gap: 16px;
        min-height: calc(100vh - 148px);
      }

      .hero,
      .codex {
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        position: sticky;
        top: 18px;
        width: 100%;
        max-width: 360px;
        justify-self: center;
        height: max(760px, calc(100vh - 118px));
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: hidden;
        border-radius: var(--radius);
      }

      .photo-wrap {
        position: relative;
        width: 100%;
        max-width: 100%;
        min-height: 0;
        overflow: hidden;
        display: grid;
        place-items: center;
        touch-action: none;
        user-select: none;
        cursor: grab;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 38%),
          linear-gradient(135deg, color-mix(in srgb, var(--accent-3) 58%, #080a0d), #090a0d);
      }

      .photo-wrap.zoomed {
        cursor: grabbing;
      }

      .photo-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at center, color-mix(in srgb, var(--accent) 28%, transparent), transparent 68%),
          radial-gradient(circle at 72% 18%, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 42%);
        pointer-events: none;
        z-index: 1;
      }

      .photo-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.78)),
          linear-gradient(90deg, rgba(0, 0, 0, 0.55), transparent 45%);
        pointer-events: none;
        z-index: 2;
      }

      .image-stage {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .photo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        transform-origin: center center;
        will-change: transform;
        pointer-events: none;
      }

      .photo-wrap img.active {
        display: block;
      }

      .photo-placeholder {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 26px;
        text-align: center;
        z-index: 1;
      }

      .placeholder-mark {
        width: min(52%, 320px);
        aspect-ratio: 1;
        border: 2px solid color-mix(in srgb, var(--accent) 52%, transparent);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.13), transparent),
          color-mix(in srgb, var(--accent-3) 42%, transparent);
        display: grid;
        place-items: center;
        box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.32);
        clip-path: polygon(50% 0, 94% 24%, 94% 76%, 50% 100%, 6% 76%, 6% 24%);
        opacity: 0.72;
        transform: translateY(-16%);
      }

      .placeholder-mark span {
        font-family: Outfit, Inter, sans-serif;
        font-size: clamp(4rem, 11vw, 8rem);
        font-weight: 800;
        color: var(--accent-2);
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        opacity: 0.82;
      }

      .photo-overlay {
        position: absolute;
        left: 18px;
        right: 18px;
        top: 24px;
        bottom: auto;
        z-index: 4;
      }

      .kicker {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .photo-overlay h2 {
        margin: 0 0 8px;
        font-family: Outfit, Inter, sans-serif;
        font-size: clamp(2.2rem, 5vw, 4.8rem);
        line-height: 0.9;
        letter-spacing: 0;
        text-shadow: 0 0 24px color-mix(in srgb, var(--accent) 30%, transparent);
      }

      .hero-short {
        max-width: 27ch;
        color: var(--text);
        font-weight: 800;
        line-height: 1.35;
        background: rgba(0, 0, 0, 0.38);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 8px 10px;
      }

      .photo-tabs,
      .image-controls {
        position: absolute;
        z-index: 5;
        display: flex;
        gap: 8px;
      }

      .photo-tabs {
        left: 18px;
        bottom: 18px;
      }

      .image-controls {
        top: 14px;
        right: 14px;
      }

      .image-controls .btn {
        background: rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(10px);
      }

      .dot {
        width: 38px;
        height: 3px;
        border: 0;
        background: rgba(255, 255, 255, 0.36);
        cursor: pointer;
      }

      .dot.active {
        background: var(--accent);
        box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 55%, transparent);
      }

      .stat-strip {
        width: 100%;
        max-width: 100%;
        padding: 12px;
        background: var(--surface-strong);
        border-top: 1px solid var(--line);
      }

      .chip {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        font-weight: 800;
      }

      .nav-row {
        width: 100%;
        max-width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        padding: 12px;
        border-top: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.22);
      }

      .nav-name {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-row .btn:first-child {
        text-align: left;
      }

      .nav-row .btn:last-child {
        text-align: right;
      }

      .codex {
        border-radius: var(--radius);
        overflow: hidden;
        min-width: 0;
      }

      .tabs {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.035);
      }

      .tab {
        padding: 10px 12px;
        color: var(--muted);
        font-weight: 900;
      }

      .tab.active {
        color: #071016;
        background: var(--accent);
        border-color: transparent;
      }

      .tab-panel {
        display: none;
        padding: 18px;
      }

      .tab-panel.active {
        display: block;
      }

      .section-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .section,
      details,
      .relationship-card,
      .mini-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.04);
      }

      .section {
        padding: 16px;
      }

      .section.wide {
        grid-column: 1 / -1;
      }

      .section h3,
      summary {
        margin: 0 0 12px;
        font-family: Outfit, Inter, sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0;
        color: var(--accent);
      }

      .section p,
      .section li,
      .details-body {
        color: var(--muted);
        line-height: 1.62;
      }

      .section p {
        margin: 0;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field {
        min-height: 74px;
        padding: 12px;
        border-left: 3px solid color-mix(in srgb, var(--accent) 72%, transparent);
        background: rgba(255, 255, 255, 0.032);
      }

      .field b {
        display: block;
        margin-bottom: 5px;
        color: var(--accent);
        font-size: 0.76rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .field span {
        color: var(--text);
        line-height: 1.45;
      }

      .tag-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        padding: 8px 10px;
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--accent) 16%, rgba(255, 255, 255, 0.07));
        border: 1px solid color-mix(in srgb, var(--accent) 32%, var(--line));
        font-weight: 800;
      }

      .bars {
        display: grid;
        gap: 12px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 110px 1fr 34px;
        gap: 10px;
        align-items: center;
      }

      .bar-row b,
      .bar-row span {
        font-size: 0.86rem;
      }

      .bar-track {
        height: 10px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.24);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        width: calc(var(--value) * 10%);
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      details {
        overflow: hidden;
      }

      details + details {
        margin-top: 10px;
      }

      summary {
        list-style: none;
        cursor: pointer;
        margin: 0;
        padding: 14px 15px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::after {
        content: "+";
        color: var(--accent);
      }

      details[open] summary::after {
        content: "-";
      }

      .details-body {
        padding: 0 15px 15px;
      }

      .relationship-graph {
        min-height: 460px;
        padding: 0;
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          rgba(0, 0, 0, 0.18);
        background-size: 34px 34px;
      }

      .map-stage {
        position: relative;
        min-height: 460px;
        width: 100%;
        overflow: hidden;
      }

      .map-tools {
        position: absolute;
        top: 12px;
        right: 12px;
        display: flex;
        gap: 8px;
        z-index: 5;
      }

      .map-canvas {
        position: absolute;
        inset: 0;
        transform: scale(var(--map-zoom, 1));
        transform-origin: center center;
      }

      .map-lines {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .map-line {
        stroke-width: 3;
        stroke-linecap: round;
        filter: drop-shadow(0 0 7px currentColor);
        opacity: 0.76;
      }

      .map-node {
        position: absolute;
        width: 96px;
        height: 96px;
        border: 2px solid rgba(255, 255, 255, 0.62);
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        place-items: center;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 10px;
        color: #071016;
        font-family: Outfit, Inter, sans-serif;
        font-weight: 800;
        text-align: center;
        cursor: grab;
        user-select: none;
        z-index: 2;
        box-shadow:
          0 0 28px var(--node-glow),
          inset 0 0 22px rgba(255, 255, 255, 0.25);
        transform: translate(-50%, -50%);
        touch-action: none;
      }

      .map-node:active {
        cursor: grabbing;
      }

      .map-node.active {
        outline: 3px solid var(--accent-2);
        outline-offset: 4px;
      }

      .map-node small {
        display: block;
        max-width: 74px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: Inter, sans-serif;
        font-size: 0.68rem;
      }

      .map-tooltip {
        position: absolute;
        left: 50%;
        bottom: calc(100% + 12px);
        width: 230px;
        transform: translateX(-50%);
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(8, 10, 13, 0.94);
        color: var(--text);
        font-family: Inter, sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        line-height: 1.4;
        box-shadow: var(--shadow);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      .map-node:hover .map-tooltip,
      .map-node:focus-visible .map-tooltip {
        opacity: 1;
      }

      .relation-type {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 5px 8px;
        border-radius: var(--radius);
        color: #071016;
        font-weight: 900;
      }

      .relationship-card,
      .mini-card {
        padding: 14px;
        cursor: pointer;
      }

      .relationship-card {
        display: grid;
        grid-template-columns: 58px 1fr;
        gap: 12px;
        align-items: center;
      }

      .avatar {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 1px solid color-mix(in srgb, var(--accent) 38%, var(--line));
        background: color-mix(in srgb, var(--accent-3) 42%, rgba(255, 255, 255, 0.06));
        font-family: Outfit, Inter, sans-serif;
        font-weight: 800;
        color: var(--accent-2);
      }

      .relationship-card b,
      .mini-card b {
        display: block;
        margin-bottom: 4px;
      }

      .relationship-card small,
      .mini-card small {
        color: var(--muted);
        line-height: 1.45;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .form-field {
        display: grid;
        gap: 6px;
      }

      .form-field.wide {
        grid-column: 1 / -1;
      }

      .form-field label {
        color: var(--accent);
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .form-field input,
      .form-field textarea,
      .form-field select {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        padding: 9px 10px;
        outline: none;
      }

      .form-field.error input {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 24%, transparent);
      }

      .form-field.error label {
        color: #ff9a8d;
      }

      .form-field textarea {
        min-height: 92px;
        resize: vertical;
      }

      .form-actions {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .form-actions-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .editor-nav {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        position: sticky;
        top: -18px;
        z-index: 10;
        padding: 8px 0;
        background: var(--surface-strong);
      }

      .photo-tools {
        display: grid;
        gap: 8px;
      }

      .photo-preview {
        width: min(180px, 100%);
        aspect-ratio: 9 / 16;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.05);
        object-fit: cover;
        display: none;
      }

      .photo-preview[src] {
        display: block;
      }

      .editor-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 12px;
        position: sticky;
        top: 42px;
        z-index: 9;
        padding: 8px 0;
        background: var(--surface-strong);
      }

      .editor-tab-panel {
        display: none;
      }

      .editor-tab-panel.active {
        display: block;
      }

      .theme-swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .theme-swatch {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        box-shadow:
          inset 0 0 16px rgba(255, 255, 255, 0.28),
          0 0 18px rgba(0, 0, 0, 0.24);
      }

      .theme-swatch.active {
        outline: 3px solid var(--accent-2);
        outline-offset: 3px;
      }

      .relation-editor {
        display: grid;
        gap: 10px;
      }

      .relation-edit-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
      }

      .relation-edit-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 900;
        color: var(--muted);
      }

      .toggle input {

      }

      .thumbs {
        padding: 12px;
        border-top: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.18);
      }

      .thumb {
        width: 82px;
        min-height: 82px;
        padding: 7px;
        display: grid;
        gap: 5px;
        justify-items: center;
        color: var(--muted);
      }

      .thumb.active {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 15%, rgba(255, 255, 255, 0.07));

        width: 34px;
        height: 34px;
        font-size: 0.82rem;
      }

      .thumb span {
        max-width: 100%;

        font-weight: 800;
        text-align: center;
        line-height: 1.15;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .empty {
        color: var(--muted);
        padding: 22px;
        text-align: center;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(0, 0, 0, 0.72);
        z-index: 30;
        padding: 18px;
      }

      .modal.open {
        display: grid;
      }

      .modal-card {
        width: min(760px, 100%);
        max-height: 86vh;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-strong);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .modal-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 14px;
      }

      .modal h3 {
        margin: 0;
        font-family: Outfit, Inter, sans-serif;
        font-size: 1.55rem;
      }

      hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 16px 0;
      }

      @media (max-width: 980px) {
        .topbar,
        .search-row,
        .layout {
          grid-template-columns: 1fr;
        }

        .actions,
        .filters {
          justify-content: flex-start;
        }

        .hero {
          position: relative;
          top: auto;
          height: 78vh;
          min-height: 560px;
        }
      }

      @media (max-width: 620px) {
        .app {
          padding: 12px;
        }

        .section-grid,
        .field-grid {
          grid-template-columns: 1fr;
        }

          content: "|";
          display: block;
          color: var(--line);
        }

        .relationship-card {
          grid-template-columns: 48px 1fr;
        }
      }
